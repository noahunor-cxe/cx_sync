template:
  name: test_cascading_secret1
  identifier: test_cascading_secret1
  versionLabel: v1
  type: Stage
  projectIdentifier: bootcampcinoahunor
  orgIdentifier: default
  tags: {}
  spec:
    type: Deployment
    spec:
      deploymentType: Kubernetes
      execution:
        steps:
          - insert:
              name: tst
              identifier: tst
              steps: <+input>
        rollbackSteps: []
      service:
        serviceRef: tst
        serviceInputs:
          serviceDefinition:
            type: Kubernetes
            spec:
              artifacts:
                primary:
                  primaryArtifactRef: <+input>
                  sources: <+input>
      environment:
        environmentRef: tst
        deployToAll: false
        infrastructureDefinitions:
          - identifier: tst
    variables:
      - name: secretInput
        type: Secret
        description: ""
        required: false
        value: <+input>
    failureStrategies:
      - onFailure:
          errors:
            - AllErrors
          action:
            type: StageRollback
