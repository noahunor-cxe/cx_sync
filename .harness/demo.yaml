pipeline:
  name: demoO
  identifier: demo
  projectIdentifier: bootcampcinoahunor
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: notification
        identifier: notification
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: false
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: prod
              namespace: default
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    registryRef: account.test
                    image: nginx
                    shell: Sh
                    command: |-
                      export MY_MESSAGE="Hello from step output"
                                echo "MY_MESSAGE: $MY_MESSAGE"
                    outputVariables:
                      - name: MY_MESSAGE
                        type: String
                        value: MY_MESSAGE
                    outputAlias:
                      key: EXPORTED
                      scope: Pipeline
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
    - stage:
        name: test
        identifier: test
        description: ""
        type: Custom
        spec:
          environment:
            environmentRef: test
            deployToAll: false
            infrastructureDefinitions: <+input>
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          echo "Hello World"
                          cd dance
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsSuccess
    - stage:
        name: run
        identifier: run
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: false
            paths: []
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: prod
              namespace: default
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Background
                  name: dind
                  identifier: dind
                  spec:
                    connectorRef: account.harnessImage
                    image: docker:25.0.4
                    shell: Sh
                    privileged: true
                contextType: Pipeline
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    connectorRef: account.harnessImage
                    image: docker:25.0.4
                    shell: Sh
                    command: |-
                      cat > Dockerfile <<'EOF'
                      FROM amazoncorretto:17-alpine
                      RUN uname -m
                      RUN java -version
                      EOF

                      echo "Dockerfile created:"
                      cat Dockerfile
                    privileged: true
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_1
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: account.harnessImage
                    repo: test
                    tags:
                      - multiarch-test
                    caching: true
                    envVariables:
                      PLUGIN_PLATFORM: linux/amd64,linux/arm64
                      PLUGIN_BUILDER_DRIVER: docker-container
                    baseImageConnectorRefs:
                      - account.harnessImage
          sharedPaths:
            - /var/run
            - /var/lib/docker
        delegateSelectors:
          - noah-delegate
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Ignore
    - stage:
        name: test0
        identifier: test0
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |+
                          #!/usr/bin/env bash
                          set -euo pipefail

                          echo "=== Secret resolution test started ==="

                          SECRET_VALUE='<+secrets.getValue("special-character")>'

                          echo "Secret resolved successfully"

                          echo "Secret length:"
                          echo "${#SECRET_VALUE}"

                          ENCODED=$(printf '%s' "$SECRET_VALUE" | base64)
                          echo "Base64 encoding succeeded"

                          DECODED=$(printf '%s' "$ENCODED" | base64 --decode)

                          if [[ "$DECODED" == "$SECRET_VALUE" ]]; then
                            echo "Round-trip encode/decode: OK"
                          else
                            echo "Round-trip encode/decode: FAILED"
                            exit 1
                          fi

                          echo "=== Secret test completed successfully ==="

                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
            rollbackSteps: []
          service:
            serviceRef: tst
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
          environment:
            environmentRef: tst
            deployToAll: false
            infrastructureDefinitions:
              - identifier: tst
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
    - stage:
        name: tst
        identifier: tst
        tags: {}
        template:
          templateRef: test_cascading_secret1
          versionLabel: v1
          templateInputs:
            type: Deployment
            spec:
              execution:
                steps:
                  - insert:
                      identifier: tst
                      steps: <+input>
              service:
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: <+input>
                          sources: <+input>
            variables:
              - name: secretInput
                type: Secret
                value: <+input>
  properties:
    ci:
      codebase:
        repoName: test
        build: <+input>
  notificationRules:
    - name: test
      identifier: test
      pipelineEvents:
        - type: PipelineEnd
        - type: PipelineStart
      notificationMethod:
        type: Email
        spec:
          userGroups:
            - boss
          recipients:
            - noah.unor@harness.io
      enabled: true
      template:
        versionLabel: v0
        templateRef: emailtemplate
        orgIdentifier: default
        projectIdentifier: bootcampcinoahunor
